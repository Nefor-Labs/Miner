name: miner_game
description: Шахтёр — mines grid mobile game
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.2.3
  animated_flip_counter: ^0.3.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  gap: ^3.0.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/miner.jpg
